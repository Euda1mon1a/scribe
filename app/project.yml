name: Scribe
options:
  bundleIdPrefix: com.aaronmontgomery
  deploymentTarget:
    iOS: "17.0"
    macOS: "26.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Scribe:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Scribe/Shared
      - path: Scribe/macOS
      - path: Scribe/iOS
      - path: Scribe/Assets.xcassets
    info:
      path: Scribe/Info.plist
      properties:
        CFBundleDisplayName: Minutes
        CFBundleName: Minutes
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: Minutes needs microphone access to record meetings for transcription.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - scribe
    entitlements:
      path: Scribe/Scribe.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaronmontgomery.scribe
        TARGETED_DEVICE_FAMILY: "1,2,6"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ScribeShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ScribeShare
    info:
      path: ScribeShare/Info.plist
      properties:
        CFBundleDisplayName: ScribeShare
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: ScribeShare/ScribeShare.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaronmontgomery.scribe.share
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: Scribe_iOS
